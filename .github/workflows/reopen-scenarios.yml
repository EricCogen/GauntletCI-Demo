name: Reopen demo scenarios

on:
  workflow_dispatch:
    inputs:
      # NOTE: GitHub caps `type: choice` dropdowns at 10 options. With the
      # tier-2 expansion this repo now ships 16 scenarios, so we use a free-form
      # string input instead. Pass either 'all' or a single scenario folder
      # name (e.g. '03-hardcoded-secret'). The handler script enumerates
      # `scenarios/*/` for the 'all' case, so no allow-list lives in CI.
      scenario:
        description: "Scenario id to reopen (or 'all'). Folder name under scenarios/."
        required: true
        default: "all"
        type: string
  schedule:
    # Weekly self-heal: rebuild canonical demo PRs every Monday 06:00 UTC so
    # they stay in sync with the latest published GauntletCI version.
    - cron: '0 6 * * 1'
  push:
    branches: [main]
    # Re-run when scenarios or the rebuild script itself change, so the
    # canonical PRs reflect the new shape of the demo.
    paths:
      - 'scenarios/**'
      - 'scripts/reopen-scenarios.sh'
      - '.github/workflows/reopen-scenarios.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    name: Rebuild scenario branch and PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          # DEMO_PR_TOKEN is optional. When absent (e.g. on a visitor's fork)
          # we fall back to the built-in GITHUB_TOKEN. Authored PRs will then
          # appear under github-actions[bot] instead of a custom identity.
          token: ${{ secrets.DEMO_PR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Eric Cogen"
          git config user.email "ericcogen@users.noreply.github.com"

      - name: Rebuild scenarios
        env:
          GH_TOKEN: ${{ secrets.DEMO_PR_TOKEN || secrets.GITHUB_TOKEN }}
          # Schedule and push events have no `inputs.scenario`; default to 'all'.
          INPUT_SCENARIO: ${{ inputs.scenario || 'all' }}
        run: bash scripts/reopen-scenarios.sh
