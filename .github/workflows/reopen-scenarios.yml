name: Reopen demo scenarios

on:
  workflow_dispatch:
    inputs:
      # NOTE: GitHub caps `type: choice` dropdowns at 10 options. With the
      # tier-2 expansion this repo now ships 16 scenarios, so we use a free-form
      # string input instead. Pass either 'all' or a single scenario folder
      # name (e.g. '03-hardcoded-secret'). The handler script enumerates
      # `scenarios/*/` for the 'all' case, so no allow-list lives in CI.
      scenario:
        description: "Scenario id to reopen (or 'all'). Folder name under scenarios/."
        required: true
        default: "all"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    name: Rebuild scenario branch and PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEMO_PR_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Eric Cogen"
          git config user.email "ericcogen@users.noreply.github.com"

      - name: Rebuild scenarios
        env:
          GH_TOKEN: ${{ secrets.DEMO_PR_TOKEN }}
          INPUT_SCENARIO: ${{ inputs.scenario }}
        run: bash scripts/reopen-scenarios.sh
