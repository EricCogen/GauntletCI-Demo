name: GauntletCI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  analyze:
    name: Pre-commit risk analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Build (sanity check)
        run: dotnet build OrderService.sln -c Release --nologo -v minimal

      - name: Test
        run: dotnet test OrderService.sln -c Release --no-build --nologo -v minimal

      - name: Install GauntletCI from NuGet
        run: dotnet tool install -g GauntletCI --version 2.1.1

      - name: Print GauntletCI version
        run: gauntletci --version

      - name: Determine commit to analyze
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug scenario-18 diff visibility
        if: github.head_ref == 'demo/18-dependabot-api-drift'
        run: |
          echo "::group::scenario-18 debug"
          echo "head_ref=${{ github.head_ref }}"
          echo "target sha=${{ steps.target.outputs.sha }}"
          echo "GITHUB_ACTOR (env)=${GITHUB_ACTOR:-<unset>}"
          echo "git rev-parse HEAD=$(git rev-parse HEAD)"
          echo "--- git log -3 of target ---"
          git log --format='%h %p %s' -3 ${{ steps.target.outputs.sha }} || true
          echo "--- diff stat parent..target ---"
          git diff --stat ${{ steps.target.outputs.sha }}^..${{ steps.target.outputs.sha }} || true
          echo "--- diff name-only ---"
          git diff --name-only ${{ steps.target.outputs.sha }}^..${{ steps.target.outputs.sha }} || true
          echo "::endgroup::"

      - name: Analyze commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Scenario 18 (dependabot-api-drift) needs GITHUB_ACTOR to look like a
          # dependency-bot identity so GCI0052 is observable. In real CI this env
          # var is set automatically when Dependabot opens the PR; here we forge
          # it via a runtime export so the canonical demo PR demonstrates the
          # rule. All other scenarios pass through the runner's actual actor.
          if [ "${{ github.head_ref }}" = "demo/18-dependabot-api-drift" ]; then
            export GITHUB_ACTOR='dependabot[bot]'
            echo "[scenario-18] Forcing GITHUB_ACTOR=$GITHUB_ACTOR"
          fi
          gauntletci analyze \
            --commit ${{ steps.target.outputs.sha }} \
            --no-banner \
            --github-annotations \
            --github-pr-comments \
            --github-checks
