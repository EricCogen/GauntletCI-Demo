name: GauntletCI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  analyze:
    name: Pre-commit risk analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4
        with:
          dotnet-version: 8.0.x

      - name: Build (sanity check)
        run: dotnet build OrderService.sln -c Release --nologo -v minimal

      - name: Test
        run: dotnet test OrderService.sln -c Release --no-build --nologo -v minimal

      - name: Install GauntletCI from NuGet
        run: dotnet tool install -g GauntletCI --version 2.0.2

      - name: Print GauntletCI version
        run: gauntletci --version

      - name: Determine commit to analyze
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scenario 18 (dependabot-api-drift) needs GITHUB_ACTOR to look like a
          # dependency-bot identity for GCI0052 to be observable. In real CI this
          # env var is set automatically when Dependabot opens the PR; here we
          # forge it so the canonical demo PR can demonstrate the rule. All other
          # scenarios pass through the runner's actual actor.
          GITHUB_ACTOR: ${{ github.head_ref == 'demo/18-dependabot-api-drift' && 'dependabot[bot]' || github.actor }}
        run: |
          gauntletci analyze \
            --commit ${{ steps.target.outputs.sha }} \
            --no-banner \
            --github-annotations \
            --github-pr-comments \
            --github-checks
